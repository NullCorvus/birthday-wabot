version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: birthday-wabot-db
    restart: unless-stopped
    ports:
      - '5433:5432'
    environment:
      POSTGRES_USER: birthday_user
      POSTGRES_PASSWORD: birthday_pass
      POSTGRES_DB: birthday_wabot
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
